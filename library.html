<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Library — Old Mountain Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --gold: #c9a84c;
    --gold-dim: #8a6f33;
    --text: #e8e4d9;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
    --green: #4caf7d;
    --blue: #4c8ecf;
    --red: #cf4c4c;
    --purple: #9b59b6;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d0f14 0%, #161920 100%);
    padding: 48px 20px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.3px;
  }
  .header-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .add-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    color: #0d0f14;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .add-btn:active { transform: scale(0.93); }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 8px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 15px;
  }
  .search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 12px 11px 36px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  .search:focus { border-color: var(--gold-dim); }
  .search::placeholder { color: var(--text-dim); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .filter-btn.active {
    background: var(--gold);
    color: #0d0f14;
    border-color: var(--gold);
    font-weight: 600;
  }

  /* BOOK LIST */
  .list {
    padding: 16px 16px 0;
  }
  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* BOOK CARD */
  .book-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .book-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .book-card:active { background: var(--surface2); }
  .book-card.read::before { opacity: 1; background: var(--green); }
  .book-card.analyzed::before { opacity: 1; background: var(--gold); }
  .book-card.reading::before { opacity: 1; background: var(--blue); }

  .book-spine {
    width: 40px;
    height: 56px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .book-info { flex: 1; min-width: 0; }
  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-author {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .book-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .tag-category { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .tag-read { background: rgba(76,175,125,0.15); color: var(--green); }
  .tag-analyzed { background: rgba(201,168,76,0.15); color: var(--gold); }
  .tag-reading { background: rgba(76,142,207,0.15); color: var(--blue); }
  .tag-tbr { background: var(--surface2); color: var(--text-dim); }

  .book-rating {
    margin-left: auto;
    color: var(--gold);
    font-size: 11px;
    flex-shrink: 0;
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .modal-author {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .modal-section {
    margin-bottom: 16px;
  }
  .modal-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .modal-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .status-row {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .status-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .status-btn.active-read { background: rgba(76,175,125,0.2); color: var(--green); border-color: var(--green); }
  .status-btn.active-reading { background: rgba(76,142,207,0.2); color: var(--blue); border-color: var(--blue); }
  .status-btn.active-analyzed { background: rgba(201,168,76,0.2); color: var(--gold); border-color: var(--gold); }
  .modal-close {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  /* ADD BOOK MODAL */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-dim); }
  .form-select { appearance: none; }
  .form-textarea { resize: none; height: 80px; line-height: 1.5; }
  .form-submit {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius);
    border: none;
    background: var(--gold);
    color: #0d0f14;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }

  /* STARS */
  .stars { display: flex; gap: 4px; margin-top: 8px; }
  .star {
    font-size: 20px;
    cursor: pointer;
    color: var(--border);
    transition: color 0.15s;
  }
  .star.on { color: var(--gold); }

  /* NOTES */
  .notes-area {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    resize: none;
    height: 90px;
    outline: none;
    line-height: 1.5;
    margin-top: 6px;
  }
  .save-notes {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: var(--radius);
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>📚 My Library</h1>
      <div class="header-subtitle">Old Mountain Capital</div>
    </div>
    <button class="add-btn" onclick="openAddModal()">+</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-analyzed">0</div>
      <div class="stat-label">Analyzed</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-read">0</div>
      <div class="stat-label">Read</div>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" type="text" placeholder="Search books..." id="searchInput" oninput="renderBooks()">
  </div>

  <div class="filters" id="filterRow"></div>
</div>

<!-- BOOK LIST -->
<div class="list" id="bookList"></div>

<!-- BOOK DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="modal" id="detailModal">
    <div class="modal-handle"></div>
    <h2 id="d-title"></h2>
    <div class="modal-author" id="d-author"></div>

    <div class="modal-section">
      <div class="modal-label">Category</div>
      <div class="modal-text" id="d-category"></div>
    </div>

    <div class="modal-section" id="d-notes-section">
      <div class="modal-label">My Notes</div>
      <textarea class="notes-area" id="d-notes" placeholder="Add your notes, key insights..."></textarea>
      <button class="save-notes" onclick="saveNotes()">Save Notes</button>
    </div>

    <div class="modal-section">
      <div class="modal-label">My Rating</div>
      <div class="stars" id="d-stars"></div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Status</div>
      <div class="status-row">
        <button class="status-btn" id="btn-read" onclick="setStatus('read')">✓ Read</button>
        <button class="status-btn" id="btn-reading" onclick="setStatus('reading')">📖 Reading</button>
        <button class="status-btn" id="btn-analyzed" onclick="setStatus('analyzed')">🧠 Analyzed</button>
      </div>
    </div>

    <button class="modal-close" onclick="closeDetailModal()">Close</button>
  </div>
</div>

<!-- ADD BOOK MODAL -->
<div class="overlay" id="addOverlay" onclick="closeAdd(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 style="margin-bottom:20px">Add Book</h2>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="f-title" placeholder="Book title">
    </div>
    <div class="form-group">
      <label class="form-label">Author</label>
      <input class="form-input" id="f-author" placeholder="Author name">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="f-category">
        <option value="Finance & Trading">Finance & Trading</option>
        <option value="Power & Strategy">Power & Strategy</option>
        <option value="History">History</option>
        <option value="Psychology">Psychology</option>
        <option value="Business">Business</option>
        <option value="Geopolitics">Geopolitics</option>
        <option value="Freemasonry">Freemasonry</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="f-status">
        <option value="tbr">To Be Read</option>
        <option value="reading">Currently Reading</option>
        <option value="read">Read</option>
        <option value="analyzed">Analyzed</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Why you're reading this, key expectations..."></textarea>
    </div>
    <button class="form-submit" onclick="addBook()">Add to Library</button>
    <button class="modal-close" style="margin-top:8px" onclick="document.getElementById('addOverlay').classList.remove('show')">Cancel</button>
  </div>
</div>

<script>
const CATEGORIES = ['All','Finance & Trading','Power & Strategy','History','Psychology','Business','Geopolitics','Freemasonry'];
const CAT_COLORS = {
  'Finance & Trading': '#c9a84c',
  'Power & Strategy': '#cf4c4c',
  'History': '#8b7355',
  'Psychology': '#9b59b6',
  'Business': '#4c8ecf',
  'Geopolitics': '#4caf7d',
  'Freemasonry': '#e67e22',
  'Other': '#7a8099'
};
const CAT_EMOJI = {
  'Finance & Trading': '📈',
  'Power & Strategy': '⚔️',
  'History': '🏛️',
  'Psychology': '🧠',
  'Business': '💼',
  'Geopolitics': '🌍',
  'Freemasonry': '🔺',
  'Other': '📖'
};

const DEFAULT_BOOKS = [
  {id:1, title:"Alpha Trader", author:"Brent Donnelly", category:"Finance & Trading", status:"analyzed", rating:5, notes:"Core FX mindset. Required reading for my approach."},
  {id:2, title:"The Art of Currency Trading", author:"Brent Donnelly", category:"Finance & Trading", status:"analyzed", rating:5, notes:""},
  {id:3, title:"Market Wizards", author:"Jack Schwager", category:"Finance & Trading", status:"read", rating:5, notes:""},
  {id:4, title:"New Market Wizards", author:"Jack Schwager", category:"Finance & Trading", status:"read", rating:4, notes:""},
  {id:5, title:"Hedge Fund Market Wizards", author:"Jack Schwager", category:"Finance & Trading", status:"read", rating:4, notes:""},

  {id:10, title:"50 in 50", author:"Brent Donnelly", category:"Finance & Trading", status:"tbr", rating:0, notes:"Brent recommended reading order: Alpha Trader → Art of Currency → 50in50"},
  {id:11, title:"Trade Wars Are Class Wars", author:"Klein & Pettis", category:"Geopolitics", status:"analyzed", rating:4, notes:""},
  {id:12, title:"The Dollar Trap", author:"Eswar Prasad", category:"Geopolitics", status:"analyzed", rating:4, notes:""},
  {id:13, title:"The Death of Money", author:"James Rickards", category:"Finance & Trading", status:"analyzed", rating:4, notes:""},
  {id:14, title:"Currency Wars", author:"James Rickards", category:"Finance & Trading", status:"read", rating:4, notes:""},
  {id:15, title:"The 48 Laws of Power", author:"Robert Greene", category:"Power & Strategy", status:"analyzed", rating:5, notes:"All Greene books read. Applied to trading & wealth building."},
  {id:16, title:"The Art of War", author:"Sun Tzu", category:"Power & Strategy", status:"read", rating:5, notes:"Maps directly to trading. Schwerpunkt. OODA."},
  {id:17, title:"The Prince", author:"Machiavelli", category:"Power & Strategy", status:"read", rating:4, notes:""},
  {id:18, title:"The Sovereign Individual", author:"Davidson & Rees-Mogg", category:"Geopolitics", status:"tbr", rating:0, notes:"Priority read. Multi-jurisdictional sovereignty framework."},
  {id:19, title:"House of Rothschild Vol.1", author:"Niall Ferguson", category:"Business", status:"tbr", rating:0, notes:"Dynasty model research. Priority."},

  {id:22, title:"Fooled by Randomness", author:"Nassim Taleb", category:"Finance & Trading", status:"read", rating:4, notes:""},
  {id:23, title:"When Money Dies", author:"Adam Fergusson", category:"History", status:"tbr", rating:0, notes:"Weimar hyperinflation. Extreme scenario prep."},
  {id:24, title:"Lords of Finance", author:"Liaquat Ahamed", category:"History", status:"tbr", rating:0, notes:""},
  {id:25, title:"Prisoners of Geography", author:"Tim Marshall", category:"Geopolitics", status:"read", rating:5, notes:""},

  {id:27, title:"Destined for War", author:"Graham Allison", category:"Geopolitics", status:"tbr", rating:0, notes:"Thucydides Trap. US-China inevitable conflict thesis."},

  {id:29, title:"The Warburgs", author:"Ron Chernow", category:"Business", status:"tbr", rating:0, notes:""},
  {id:30, title:"The Ascent of Money", author:"Niall Ferguson", category:"Finance & Trading", status:"read", rating:4, notes:""},
  {id:31, title:"Atlas Shrugged", author:"Ayn Rand", category:"Power & Strategy", status:"tbr", rating:0, notes:"Moral framework for self-interest & wealth building. Withdrawal from corrupt systems."},
  {id:32, title:"The Fourth Turning", author:"Strauss & Howe", category:"History", status:"tbr", rating:0, notes:"Generational cycles. Why everything feels like collapse."},
  {id:33, title:"Market Mind Games", author:"Denise Shull", category:"Psychology", status:"tbr", rating:0, notes:"Emotions carry information. Applied neuroeconomics."},
  {id:34, title:"Street Smarts", author:"Raschke & Connors", category:"Finance & Trading", status:"tbr", rating:0, notes:"Short-term patterns. Pre-algo patterns that persist."},
  {id:35, title:"Masonic Ritual and Monitor", author:"Various", category:"Freemasonry", status:"read", rating:5, notes:""},
  {id:36, title:"Born in Blood", author:"John J. Robinson", category:"Freemasonry", status:"read", rating:4, notes:""},
  {id:37, title:"The Craft", author:"John Dickie", category:"Freemasonry", status:"tbr", rating:0, notes:""},
  {id:38, title:"Economics in One Lesson", author:"Henry Hazlitt", category:"Finance & Trading", status:"tbr", rating:0, notes:""},
  {id:39, title:"The Road to Serfdom", author:"F.A. Hayek", category:"Geopolitics", status:"tbr", rating:0, notes:""}
];

let books = [];
let activeFilter = 'All';
let currentBookId = null;
let currentRating = 0;

function loadBooks() {
  const saved = localStorage.getItem('omc_library');
  if (saved) {
    books = JSON.parse(saved);
  } else {
    books = DEFAULT_BOOKS.map(b => ({...b}));
    saveBooks();
  }
}

function saveBooks() {
  localStorage.setItem('omc_library', JSON.stringify(books));
}

function getStats() {
  return {
    total: books.length,
    analyzed: books.filter(b => b.status === 'analyzed').length,
    read: books.filter(b => b.status === 'read' || b.status === 'analyzed').length
  };
}

function renderStats() {
  const s = getStats();
  document.getElementById('stat-total').textContent = s.total;
  document.getElementById('stat-analyzed').textContent = s.analyzed;
  document.getElementById('stat-read').textContent = s.read;
}

function renderFilters() {
  const row = document.getElementById('filterRow');
  row.innerHTML = CATEGORIES.map(c => `
    <button class="filter-btn ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>
  `).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  renderBooks();
}

function renderBooks() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = books.filter(b => {
    const matchCat = activeFilter === 'All' || b.category === activeFilter;
    const matchQ = !query || b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query);
    return matchCat && matchQ;
  });

  // Sort: analyzed → reading → read → tbr
  const order = {analyzed:0, reading:1, read:2, tbr:3};
  filtered.sort((a,b) => (order[a.status]||3) - (order[b.status]||3));

  const list = document.getElementById('bookList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No books found</div>';
    return;
  }

  list.innerHTML = filtered.map(b => {
    const color = CAT_COLORS[b.category] || '#7a8099';
    const emoji = CAT_EMOJI[b.category] || '📖';
    const statusTag = b.status === 'analyzed' ? '<span class="tag tag-analyzed">Analyzed</span>'
      : b.status === 'read' ? '<span class="tag tag-read">Read</span>'
      : b.status === 'reading' ? '<span class="tag tag-reading">Reading</span>'
      : '<span class="tag tag-tbr">TBR</span>';
    const stars = b.rating > 0 ? '★'.repeat(b.rating) : '';
    return `
      <div class="book-card ${b.status}" onclick="openDetail(${b.id})">
        <div class="book-spine" style="background:${color}22; color:${color}">${emoji}</div>
        <div class="book-info">
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author}</div>
          <div class="book-meta">
            <span class="tag tag-category">${b.category}</span>
            ${statusTag}
            ${stars ? `<span class="book-rating">${stars}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function openDetail(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;
  currentBookId = id;
  currentRating = b.rating || 0;
  document.getElementById('d-title').textContent = b.title;
  document.getElementById('d-author').textContent = b.author;
  document.getElementById('d-category').textContent = b.category;
  document.getElementById('d-notes').value = b.notes || '';
  renderDetailStars();
  updateStatusButtons(b.status);
  document.getElementById('detailOverlay').classList.add('show');
}

function renderDetailStars() {
  const cont = document.getElementById('d-stars');
  cont.innerHTML = [1,2,3,4,5].map(i =>
    `<span class="star ${i<=currentRating?'on':''}" onclick="setRating(${i})">★</span>`
  ).join('');
}

function setRating(n) {
  currentRating = n;
  const b = books.find(x => x.id === currentBookId);
  if (b) { b.rating = n; saveBooks(); renderBooks(); }
  renderDetailStars();
}

function updateStatusButtons(status) {
  ['read','reading','analyzed'].forEach(s => {
    const btn = document.getElementById('btn-'+s);
    btn.className = 'status-btn' + (status===s ? ' active-'+s : '');
  });
}

function setStatus(status) {
  const b = books.find(x => x.id === currentBookId);
  if (b) { b.status = status; saveBooks(); renderStats(); renderBooks(); }
  updateStatusButtons(status);
}

function saveNotes() {
  const b = books.find(x => x.id === currentBookId);
  if (b) {
    b.notes = document.getElementById('d-notes').value;
    saveBooks();
    document.getElementById('detailOverlay').classList.remove('show');
    renderBooks();
  }
}

function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetailModal();
}
function closeDetailModal() {
  document.getElementById('detailOverlay').classList.remove('show');
}

function openAddModal() {
  document.getElementById('f-title').value = '';
  document.getElementById('f-author').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('addOverlay').classList.add('show');
}
function closeAdd(e) {
  if (e.target === document.getElementById('addOverlay'))
    document.getElementById('addOverlay').classList.remove('show');
}

function addBook() {
  const title = document.getElementById('f-title').value.trim();
  const author = document.getElementById('f-author').value.trim();
  if (!title || !author) { alert('Title and author required'); return; }
  const newBook = {
    id: Date.now(),
    title,
    author,
    category: document.getElementById('f-category').value,
    status: document.getElementById('f-status').value,
    rating: 0,
    notes: document.getElementById('f-notes').value.trim()
  };
  books.unshift(newBook);
  saveBooks();
  renderStats();
  renderBooks();
  document.getElementById('addOverlay').classList.remove('show');
}

loadBooks();
renderStats();
renderFilters();
renderBooks();
</script>
</body>
</html>
